<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数学可视化题库</title>
    <style>
      body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #fff; color: #0f172a; }
      main { max-width: 960px; margin: 0 auto; padding: 48px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; background: #f8fafc; }
    </style>
  </head>
  <body>
    <main>
      <h1>数学可视化题库</h1>
      <p>按专题整理天津中考与模拟题的可视化讲解网页。</p>
      <div class="grid">
        <div class="card">天津三模 25题专题</div>
        <div class="card">二次函数路径最值</div>
        <div class="card">几何动态重叠面积</div>
      </div>
    </main>
  </body>
</html>
