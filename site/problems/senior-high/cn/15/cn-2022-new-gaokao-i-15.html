  <script>

  <script type="application/json" id="calculusSpec">{"$schema":"../../schemas/calculus-spec.schema.json","version":1,"id":"cn-2022-new-gaokao-i-15","parameter":{"name":"x0","initial":-1},"bindings":[{"name":"a","expr":"x0^2/(1-x0)"},{"name":"x1","expr":"x0/(x0-1)"}],"panels":[{"id":"curves","title":"函数曲线与过原点切线","xLabel":"x","yLabel":"y","viewport":{"x":0.06,"y":0.04,"width":0.88,"height":0.92},"domain":{"minX":-3,"maxX":1.55,"minY":-1.5,"maxY":10}}],"functions":[{"id":"f","panelId":"curves","variable":"x","expr":"(x+a)*exp(x)","derivativeExpr":"(x+a+1)*exp(x)","domain":[{"min":-3,"max":1.55}]}],"functionPoints":[{"id":"P0","functionId":"f","xExpr":"x0"},{"id":"P1","functionId":"f","xExpr":"x1"}],"tangentLines":[{"id":"tangent0","functionId":"f","atExpr":"x0"},{"id":"tangent1","functionId":"f","atExpr":"x1"}],"lines":[]}</script>

<script>

  const __CALCULUS_DECORATIONS__ = {"$schema":"../../schemas/calculus-decorations.schema.json","_comment":"2022 新高考 I 卷第 15 题：过原点切线条数与参数范围","layers":{"grid":{"elements":[{"type":"grid","panelId":"curves"}]},"functionCurve":{"elements":[{"type":"functionCurve","functionId":"f","color":"#2563eb"},{"type":"functionLabel","functionId":"f","xExpr":"0.7","text":"y=f(x)=(x+a)eˣ","color":"#2563eb","dx":8,"dy":-12}]}},"steps":{"s1":{"add":[{"type":"tangentLine","tangentId":"tangent0","color":"#dc2626"},{"type":"functionPoint","pointId":"P0","label":"P(x₀,f(x₀))","color":"#2563eb","dx":10,"dy":-12}]},"s2":{"add":[{"type":"tangentLine","tangentId":"tangent0","color":"#dc2626"},{"type":"functionPoint","pointId":"P0","label":"P(x₀,f(x₀))","color":"#2563eb","dx":10,"dy":-12}]},"s3":{"add":[{"type":"tangentLine","tangentId":"tangent0","color":"#dc2626"},{"type":"tangentLine","tangentId":"tangent1","color":"#0f766e","dash":"7 5"},{"type":"functionPoint","pointId":"P0","label":"P₀","color":"#dc2626","dx":8,"dy":-12},{"type":"functionPoint","pointId":"P1","label":"P₁","color":"#0f766e","dx":8,"dy":18}]},"s4":{"add":[{"type":"tangentLine","tangentId":"tangent0","color":"#dc2626"},{"type":"tangentLine","tangentId":"tangent1","color":"#0f766e","dash":"7 5"},{"type":"functionPoint","pointId":"P0","label":"P₀","color":"#dc2626","dx":8,"dy":-12},{"type":"functionPoint","pointId":"P1","label":"P₁","color":"#0f766e","dx":8,"dy":18}]}}};

</script>
