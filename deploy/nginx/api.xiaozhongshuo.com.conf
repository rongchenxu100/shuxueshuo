# api.xiaozhongshuo.com
# 不使用 CLB：浏览器直连 ECS 的 80/443，TLS 在本机 Nginx 终结。
# 80 端口仅做 301 跳转到 HTTPS，业务只在 443 提供服务。

# HTTP：跳转到 HTTPS
server {
    listen       80;
    server_name  api.xiaozhongshuo.com;
    return 301 https://$host$request_uri;
}

# HTTPS：证书在本机
server {
    listen       443 ssl http2;
    server_name  api.xiaozhongshuo.com;
    root         /home/ronghao/code/DarkKnight/public;

    ssl_certificate     /home/ronghao/cert/api-xiaozhongshuo/api.xiaozhongshuo.com.pem;
    ssl_certificate_key /home/ronghao/cert/api-xiaozhongshuo/api.xiaozhongshuo.com.key;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
