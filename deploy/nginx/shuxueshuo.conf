# shuxueshuo.com — 静态站点（域名直连 ECS，TLS 在 Nginx 终结）
# 仓库部署路径：/home/ronghao/code/shuxueshuo/site
#
# 证书目录：/home/ronghao/cert/shuxueshuo（须保证 nginx 进程可读，见 deploy/README.md）
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP：跳转 HTTPS（若需暂时保留纯 HTTP 访问，可注释掉本 server，改用下方「仅 HTTP」注释块）
server {
    listen 80;
    listen [::]:80;
    server_name shuxueshuo.com www.shuxueshuo.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shuxueshuo.com www.shuxueshuo.com;

    ssl_certificate     /home/ronghao/cert/shuxueshuo/shuxueshuo.com.pem;
    ssl_certificate_key /home/ronghao/cert/shuxueshuo/shuxueshuo.com.key;

    # TLSv1.3 需 Nginx 与 OpenSSL 版本足够新；旧环境请只用 TLSv1.2
    ssl_protocols TLSv1.2;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    root /home/ronghao/code/shuxueshuo/site;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}

# ----- 可选：调试阶段保留 HTTP、不强制跳转时，删除上方第一个 server 的 return，
#     换成下列「仅 HTTP」块（与上方 HTTPS server 二选一保留 HTTP 服务方式）。
