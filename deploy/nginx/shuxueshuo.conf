# shuxueshuo.com — 静态站点 + /api/ 反代到本机 Uvicorn:8000（微信 JS-SDK 等）
# 仓库部署路径：/home/ronghao/code/shuxueshuo/site（静态）、server（API）
#
# 证书目录：/home/ronghao/cert/shuxueshuo（须保证 nginx 进程可读，见 deploy/README.md）
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP：直连访客跳 HTTPS。若前有 CDN/LB 已终结 HTTPS、仅以 HTTP 回源并带
# X-Forwarded-Proto: https，则不能再 301，否则浏览器会报「重定向次数过多」。
server {
    listen 80;
    listen [::]:80;
    server_name shuxueshuo.com www.shuxueshuo.com;

    if ($http_x_forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    root /home/ronghao/code/shuxueshuo/site;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 微信 JS-SDK 签名等 API（Uvicorn 本机 8000，勿对公网开放）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shuxueshuo.com www.shuxueshuo.com;

    ssl_certificate     /home/ronghao/cert/shuxueshuo/shuxueshuo.com.pem;
    ssl_certificate_key /home/ronghao/cert/shuxueshuo/shuxueshuo.com.key;

    # TLSv1.3 需 Nginx 与 OpenSSL 版本足够新；旧环境请只用 TLSv1.2
    ssl_protocols TLSv1.2;
    # 勿在本文件重复 ssl_session_cache shared:SSL:… — 与全局/其他站点只能声明一次

    root /home/ronghao/code/shuxueshuo/site;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}

# ----- 可选：调试阶段保留 HTTP、不强制跳转时，删除上方第一个 server 的 return，
