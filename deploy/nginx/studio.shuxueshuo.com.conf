# studio.shuxueshuo.com — Studio 创作工作台
# Docker 容器建议映射到本机 127.0.0.1:3000 或 0.0.0.0:3000。
#
# 前端部署说明见：deploy/frontend-studio-workbench.md
# 证书目录示例：/home/ronghao/cert/studio-shuxueshuo
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP：跳转到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name studio.shuxueshuo.com;

    return 301 https://$host$request_uri;
}

# HTTPS：反代到本机 Next.js standalone server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studio.shuxueshuo.com;

    ssl_certificate     /home/ronghao/cert/studio-shuxueshuo/studio.shuxueshuo.com.pem;
    ssl_certificate_key /home/ronghao/cert/studio-shuxueshuo/studio.shuxueshuo.com.key;

    # CentOS 7 / 旧 OpenSSL 环境优先使用 TLSv1.2，避免 TLSv1.3 兼容问题。
    ssl_protocols TLSv1.2;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js / SSE 上传进度需要避免代理缓冲。
        proxy_buffering off;
        proxy_cache off;
    }
}
